run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - misspell
    - goimports
    - revive
    - unparam
    - unconvert

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - unparam
